app = "d3gns"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT           = "8000"
  DB_PATH        = "/data/bots.db"
  LOG_DIR        = "/data"
  PAPER_MODE     = "true"
  STARTING_CAPITAL = "500"
  PHASE          = "safe"
  # Wave 4 feature flags (bots start OFF — user must POST /api/lab/start to activate)
  LAB_AUTO_START = "false"
  MALL_AUTO_START = "false"
  REALTIME_AUTO_START = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout  = "5s"
    grace_period = "30s"
    method   = "get"
    path     = "/api/health"
    protocol = "http"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source      = "d3gns_data"
  destination = "/data"
  initial_size = "5gb"
